<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style-carrito.css">
    <style>
        body{
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <header>

    </header>
    <main>
        <section class="targetas">
            <div class="div-targ">
                <!--Targeta-->
                <div class="target_cab">
                    <input type="checkbox" id="check">
                    <h4>Todos los productos</h4>
                </div>
                
                <div class="target_cab1">
                    <div class="check-img">
                        <input type="checkbox" id="check">
                        <img src="img/chimuelo.png" alt="">
                    </div>
                    <!--Targeta 1-->
                    <div class="informacion">
                        <p>Chimuelo </p>
                        <button class="eliminar">Eliminar</button>
                        <h2>$ 44.980</h2>
                    </div>

                    <div class="btn-cantidad">
                        <p>+</p>
                        <p class="num">1</p>
                        <p>-</p>
                    </div>
                    <div class="linea-car"></div>
                    <div class="info">
                        <h3>Informacion de envio</h3>
                        <p>Por ser su primera compra su envio es gratuito</p>
                    </div>
                </div>
                <div class="target_cab1">
                    <input type="checkbox" id="check">
                    <img src="img/canasta.png" alt="">
                </div>
            </div>
            
            <div class="resumen">
                <div class="tabla_total">
                <h2>Resumen de compra</h2>
                <div class="linea"></div>
                <div precio-total>
                    <p>Productos (2)</p>
                    <p>$ 164.980</p>
                    <p>$ 5.000</p>
                    <p>Coste de Envio</p>
                    <h3>Total</h3>
                    <p>$ 169.988</p>
                </div>
                <div class="targ-pago">
                    <img src="img/PSE.png" alt="">
                    <a href="#pagos">Continuar pago por PSE</a>
                </div>

                <div class="targ-pago">
                    <img src="img/Visa.png" alt="">
                    <a href="#pagos">Continuar pago por Targeta</a>
                </div>
                </div>
            
        </section>

        <section class="articulos">
            <div class="text-prod">
                <h2>Productos para tu carrito</h2>
                <div class="raya"></div>
                <div class="vermas">
                    <a href="#vercarritoo">Ver mas</a>
                    <img src="img/Right Arrow.png" alt="">
                </div>
            </div>

            <div class="prod">

            </div>
        </section>
    </main>
    <footer>
        
    </footer>
</body>
</html>
