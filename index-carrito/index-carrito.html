<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style-carrito.css">
</head>
<body>
    <header>
        <div class="cabezera">
                <div class="logo_oficial">
                <img src="img/Cabezera/logo_oficial.png" alt="Logo.png">
            </div>
            <input type="checkbox" id="check"> <!-- caja de opciones -->
            <label for="check" class="mostrar-menu">
                &#8801;
            </label>
            <nav class="naveg_page">
                <a href="#"> Dulceria</a>
                <a href="#">Regalos</a>
                <a href="#">¿Quienes Somos?</a>
                <label for="check" class="esconder-menu">
                    &#215;
                </label>
            </nav>
            <div class="carro"><img src="img/Cabezera/Shopping Cart.png" alt="Shopping.png" width="52px"></div>
                <div class="carrito_loggin">
                    <a href=""><img src="img/Cabezera/Test Account.png" alt="loggin.png" width="35px"></a>
                    <a href="#ingresar">Ingresar</a>
                </div>
            </div>
    </header>
    
    <main>
        <section class="targetas-precio">
            <div class="imagen-check"></div>
        </section>
    </main>

    <footer>
        <div class="footer_contenido">
            <div class="foot">
                <p>Tu Dulceria Favorita</p>
                <img src="img/Footer/logo_oficial.png" alt="logo.png">
            </div>

            <div class="canales">
                <p>Visita Nuestros canales digitales</p>
                <div class="ico">
                    <img src="img/Footer/youtube blanco 1.png" alt="youtube">
                    <img src="img/Footer/Twitter Circled.png" alt="twitter">
                    <img src="img/Footer/Facebook.png" alt="Facebook">
                    <img src="img/Footer/Instagram Circle.png" alt="Instagram">
                    <img src="img/Footer/WhatsApp.png" alt="Whatsapp">
                </div>
                <div class="url_quien_som">
                    <p>¿Quienes Somos?</p>
                    <img src="img/Footer/con-park_share.png" alt="visited">
                </div>
            </div>

            <div class="Tiendas">
                <p>Visita Nuestras Tiendas</p>
                <img src="img/Footer/Shop Location.png" alt="tienda_icono">
            </div>
        </div>
        <!-- Terminos y condiciones de la pagina -->
        <div class="footer_links">
            <a href="">Términos y condiciones</a>
            <a href="">Políticas de privacidad</a>
            <a href="">Contactos</a>
        </div>
    </footer>
</body>
</html>
