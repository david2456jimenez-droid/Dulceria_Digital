<!DOCTYPE html>
<html>

<head>
    <title>Dulceria Digital Adso</title>
    <link rel="stylesheet" href="style_index_principal.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-with, initial-scale=1.0">
    <meta name="description" content="Dulceria Digital con los mejores dulces">
</head>

<body>
    <div class="Encabezado">
        <div class="logoimg">
            <img src="img/logo_oficial.png">
        </div>

        <div class="text-header">
            <p>Dulceria</p>
        </div>
        <div class="text-header">
            <p>Regalos</p>
        </div>
        <div class="text-header">
            <p>¿Quienes Somos?</p>
        </div>
        <div class="log_carrito">
            <img src="img/Shopping Cart.png">
        </div>

        <div class="Ingresar">
            <div class="img_login">
                <img src="img/Test Account.png">
            </div>
            <p>Ingresar</p>
        </div>
    </div>
    <div class="Banner_preferenciales">
        <img src="img/Banner_preferenciales.png">
        <!--creo boton de preferenciales-->
        <div class="Boton_preferencial">
            <p style="font-size: 205px 35px">Ver Promociones</p>
            <div class="Arrow_preferenciales">
                <img src="img/right-arrow 1.png" alt="Arrow_Preferen" width="23px" height="23px">
            </div>
        </div>
    </div>
    <div class="ranking_text">
        <p style="font-size: 36px;">Ranking de productos mas vendidos</p>
    </div>
    
    <!-- Ranking de productos-->
    <div class="Ranking_contenedor">
        <!-- Ranking Top 1 -->
        <div class="Cuadro_ranking">
            <div class="prod_rank">
                <img src="img/gomas-grissly-sandia-puesto 1.png" width="65%" alt="Chocolatinas Jet image">
            </div>
            <div class="numeros">
                <img src="img/Ranking puesto 1.png">
            </div>
            <p style="font-size: 32px;">Gomas Grissly Acida</p>
            <p style="font-size: 32px;color: #D4537E;">$3.600</p>
            <p style="font-size: 32px;">10.1 k Vendidos</p>
        </div>

        <!-- Ranking Top 2 -->
        <div class="Cuadro_ranking">
            <div class="prod_rank">
                <img src="img/Estuche de corazones - puesto 2.png" width="70%" alt="Estuche de corazones image">
            </div>
            <div class="numeros">
                <img src="img/Ranking puesto 2.png">
            </div>
            <p style="font-size: 32px;">Estuche de Corazones</p>
            <p style="font-size: 32px;color: #D4537E;">$3.600</p>
            <p style="font-size: 32px;">8.1 k Vendidos</p>
        </div>

        <!--rANKINF TOP 3 -->
        <div class="Cuadro_ranking">
            <div class="prod_rank">
                <img src="img/Chocolatina Jet 1.png" width="70%" alt="Gomitasa grissly image">  
            </div>
            <div class="numeros">
                <img src="img/Ranking puesto 3.png">
            </div>
            <p style="font-size: 32px;">Chocolatina Jet</p>
            <p style="font-size: 32px;color: #D4537E;">$3.600</p>
            <p style="font-size: 32px;">5.5 k Vendidos</p>
        </div>
    </div>
    <div class="Pedidos_text">
        <div class="Tabla_text">
            <img src="img/tabla lista.png" width="20%">
            <p style="font-size: 28px;">Tus pedidos reciente</p>
        </div>
        <div class="Ver_todos">
            <p style="font-size: 25px; color: #FF950A;">Ver Todos</p>
            <img src="img/right-arrow line right.png" width="32%" height="45px">
        </div>
    </div>
</body>
</html>
